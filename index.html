<meta charset="UTF-8">
<style>
body {
    margin: 0;
    padding: 0;
    background: #008080;
    font-family: 'MS Sans Serif', sans-serif;
    overflow: hidden;
    animation: backgroundFlicker 0.2s infinite, warpEffect 1s infinite;
}

.desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
}

.taskbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 30px;
    background: #c0c0c0;
    border-top: 2px solid #ffffff;
    display: flex;
    align-items: center;
}

.start-button {
    margin: 2px 5px;
    padding: 2px 10px;
    background: #c0c0c0;
    border: 2px outset #ffffff;
    cursor: pointer;
}

.window {
    position: absolute;
    width: 400px;
    background: #c0c0c0;
    border: 2px outset #ffffff;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
}

.title-bar {
    background: #800000;
    color: white;
    padding: 3px;
    display: flex;
    justify-content: space-between;
}

.content {
    padding: 10px;
    color: red;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

.error-popup {
    position: absolute;
    background: #c0c0c0;
    border: 2px outset #ffffff;
    padding: 20px;
    display: none;
    z-index: 100;
}

.glitch {
    animation: glitch 0.2s infinite;
    position: absolute;
}

@keyframes glitch {
    0% { transform: translate(0) skew(0deg); filter: hue-rotate(0deg); }
    20% { transform: translate(-15px, 15px) skew(20deg); filter: hue-rotate(90deg); }
    40% { transform: translate(-15px, -15px) skew(-20deg); filter: hue-rotate(180deg); }
    60% { transform: translate(15px, 15px) skew(-15deg); filter: hue-rotate(270deg); }
    80% { transform: translate(15px, -15px) skew(15deg); filter: hue-rotate(360deg); }
    100% { transform: translate(0) skew(0deg); filter: hue-rotate(0deg); }
}

@keyframes colorPulse {
    0% { background: #800000; }
    50% { background: #ff0000; }
    100% { background: #800000; }
}

.timer {
    position: fixed;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    padding: 10px;
    font-family: monospace;
    z-index: 1000;
    font-size: 24px;
    text-shadow: 0 0 10px #ff0000;
}

.antivirus-button {
    background: linear-gradient(45deg, #00ff00, #008000);
    color: white;
    padding: 20px 40px;
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    border: 4px solid #00ff00;
    border-radius: 10px;
    text-shadow: 0 0 10px #00ff00;
    pointer-events: auto;
    display: none; /* Will be shown after 20 seconds */
}

.antivirus-button:active {
    transform: translate(-50%, -50%) scale(0.95);
    background: linear-gradient(45deg, #008000, #004000);
}

.skull {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    color: red;
    z-index: -1;
    opacity: 0.2;
}

@keyframes warpEffect {
    0% { transform: perspective(500px) rotateX(0deg); }
    25% { transform: perspective(500px) rotateX(10deg) skewX(10deg); }
    75% { transform: perspective(500px) rotateX(-10deg) skewX(-10deg); }
    100% { transform: perspective(500px) rotateX(0deg); }
}

@keyframes backgroundFlicker {
    0% { background: #008080; }
    5% { background: #800000; }
    10% { background: #008080; }
    15% { background: #000080; }
    20% { background: #800080; }
    25% { background: #008080; }
    30% { background: #FF0000; }
    35% { background: #008080; }
    40% { background: #000000; }
    45% { background: #008080; }
    50% { background: #FF00FF; }
    55% { background: #000000; }
    60% { background: #800000; }
    65% { background: #000080; }
    70% { background: #FF0000; }
    75% { background: #008000; }
    80% { background: #000000; }
    85% { background: #FF00FF; }
    90% { background: #800080; }
    95% { background: #000000; }
    100% { background: #008080; }
}

.main-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000080;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 9999;
}

.menu-button {
    background: #c0c0c0;
    border: 2px outset #ffffff;
    padding: 15px 30px;
    font-size: 24px;
    cursor: pointer;
    width: 300px;
    font-family: 'MS Sans Serif', sans-serif;
}

.menu-button:hover {
    background: #d0d0d0;
}

.low-detail-mode {
    animation: none !important;
}

.low-detail-mode .window {
    animation: none !important;
    transform: none !important;
}

.low-detail-mode .glitch {
    animation: none !important;
}

.low-detail-mode body {
    animation: simpleBgFlicker 0.5s infinite !important;
}

@keyframes simpleBgFlicker {
    0% { background: #008080; }
    50% { background: #800000; }
    100% { background: #008080; }
}

.game-over-screen {
    height: 100vh;
    background: black;
    color: red;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 72px;
    font-family: monospace;
    animation: glitch 0.1s infinite;
}

.retry-button {
    background: #ff0000;
    color: white;
    border: 2px solid white;
    padding: 15px 30px;
    font-size: 24px;
    margin-top: 30px;
    cursor: pointer;
    font-family: monospace;
}

.retry-button:hover {
    background: #cc0000;
}
</style>
</head>
<body>

function createErrorWindow() {
    if (!virusActive) return;

    for (let i = 0; i < 3; i++) {
        const error = document.createElement('div');
        error.className = 'window glitch';
        error.style.left = Math.random() * (window.innerWidth - 300) + 'px';
        error.style.top = Math.random() * (window.innerHeight - 200) + 'px';
        error.style.transform = `scale(${0.5 + Math.random()})`;

        error.innerHTML = `
            <div class="title-bar">
                <div>CRITICAL SYSTEM FAILURE</div>
                <div>X</div>
            </div>
            <div class="content">
                ${errorMessages[Math.floor(Math.random() * errorMessages.length)]}
            </div>
        `;

        document.body.appendChild(error);
    }

    if (audioInitialized) {
        const audio = new Audio('data:audio/wav;base64,//uQRAAAAWMSLwUIYAAsYkXgoQwAEaYLWfkWgAI0wWs/ItAAAGDgYtAgAyN+QWaAAihwMWm4G8QQRDiMcCBcH3Cc+CDv/7xA4Tvh9Rz/y8QADBwMWgQAZG/ILNAARQ4GLTcDeIIIhxGOBAuD7hOfBB3/94gcJ3w+o5/5eIAIAAAVwWgQAVQ2ORaIQwEMAJiDg95G4nQL7mQVWI6GwRcfsZAcsKkJvxgxEjzFUgfHoSQ9Qq7KNwqHwuB13MA4a1q/DmBrHgPcmjiGoh//EwC5nGPEmS4RcfkVKOhJf+WOgoxJclFz3kgn//dBA+ya1GhurNn8zb//9NNutNuhz31f////9vt///z+IdAEAAAK4LQIAKobHItEIYCGAExBwe8jcToF9zIKrEdDYIuP2MgOWFSE34wYiR5iqQPj0JIeoVdlG4VD4XA67mAcNa1fhzA1jwHuTRxDUQ//iYBczjHiTJcIuPyKlHQkv/LHQUYkuSi57yQT//uggfZNajQ3Vmz+Zt//+mm3Wm3Q576v////+32///5/EOgAAADVghQAAAAA==');
        audio.play();
    }
}

let holdStartTime = 0;
const HOLD_DURATION = 6000; // 6 seconds in milliseconds

function initializeAntivirusButton() {
    const antivirusButton = document.getElementById('antivirus');
    if (!antivirusButton) return;

    // Remove old event listeners if any
    antivirusButton.replaceWith(antivirusButton.cloneNode(true));
    
    // Get fresh reference after clone
    const newAntivirusButton = document.getElementById('antivirus');
    
    newAntivirusButton.addEventListener('mousedown', function() {
        holdStartTime = Date.now();
        this.style.background = 'linear-gradient(45deg, #008000, #004000)';
        this.textContent = 'HOLD FOR 6 SECONDS TO ACTIVATE...';
    });

    newAntivirusButton.addEventListener('mouseup', function() {
        this.style.background = 'linear-gradient(45deg, #00ff00, #008000)';
        this.textContent = 'EXECUTE ANTIVIRUS NOW!';
        holdStartTime = 0;
    });

    newAntivirusButton.addEventListener('mouseleave', function() {
        this.style.background = 'linear-gradient(45deg, #00ff00, #008000)';
        this.textContent = 'EXECUTE ANTIVIRUS NOW!';
        holdStartTime = 0;
    });
}

function checkAntivirusHold() {
    if (!virusActive) return;
    
    const antivirusButton = document.getElementById('antivirus');
    if (!antivirusButton) return; // Exit if button doesn't exist
    
    if (holdStartTime > 0) {
        const holdDuration = Date.now() - holdStartTime;
        
        if (holdDuration >= HOLD_DURATION) {
            if (Math.random() > 0.7) {
                alert('VIRUS NEUTRALIZED - SYSTEM SAVED!');
                virusActive = false;
                showGameOver();
            } else {
                alert('ANTIVIRUS FAILED - SYSTEM CORRUPTION ACCELERATING!');
                timeLeft = Math.max(timeLeft - 5, 1);
                holdStartTime = 0;
                antivirusButton.style.background = 'linear-gradient(45deg, #00ff00, #008000)';
                antivirusButton.textContent = 'EXECUTE ANTIVIRUS NOW!';
            }
        } else {
            const remainingSeconds = Math.ceil((HOLD_DURATION - holdDuration) / 1000);
            antivirusButton.textContent = `HOLD FOR ${remainingSeconds} MORE SECONDS...`;
        }
    }
    
    if (virusActive) {
        requestAnimationFrame(checkAntivirusHold);
    }
}

// Initialize the main menu
function showMainMenu() {
    const menuHtml = `
        <div class="main-menu">
            <h1 style="color: white; font-size: 48px; margin-bottom: 40px;">VIRUS SIMULATOR</h1>
            <button class="menu-button" onclick="startGame(false)">START GAME (NORMAL)</button>
            <button class="menu-button" onclick="startGame(true)">START GAME (LOW DETAIL)</button>
        </div>
    `;
    document.body.innerHTML = menuHtml;
}

// Modify the game over screen
function showGameOver() {
    document.body.innerHTML = `
        <div class="game-over-screen">
            <div>SYSTEM DESTROYED ☠️<br>TOTAL CORRUPTION ACHIEVED</div>
            <button class="retry-button" onclick="showMainMenu()">RETRY</button>
        </div>
    `;
}

// Start game function
function startGame(lowDetail) {
    lowDetailMode = lowDetail;
    gameStarted = true;
    
    // Reset game state
    virusActive = true;
    timeLeft = 30;
    corruptionLevel = 0;
    
    // Restore original game HTML
    document.body.innerHTML = `
        <div class="desktop ${lowDetail ? 'low-detail-mode' : ''}">
            <div class="skull">☠️</div>
            <div class="timer">Time remaining: <span id="countdown">30</span>s</div>
            <button class="antivirus-button" id="antivirus">EXECUTE ANTIVIRUS NOW!</button>
            <div class="taskbar">
                <div class="start-button">Start</div>
                <div class="time">4:20 PM</div>
            </div>
        </div>
    `;
    
    // Reinitialize game systems
    initializeAntivirusButton();
    updateTimer();
    increaseCorruption();
    
    // Start checking antivirus hold
    requestAnimationFrame(checkAntivirusHold);
}

// Modify the updateTimer function to use the new game over screen
function updateTimer() {
    if (!virusActive) return;
    
    timeLeft--;
    const countdownElement = document.getElementById('countdown');
    if (countdownElement) {
        countdownElement.textContent = timeLeft;
    }
    
    if (timeLeft <= 0) {
        showGameOver();
        virusActive = false;
        return;
    }
    
    if (timeLeft < 20) {
        const antivirusButton = document.getElementById('antivirus');
        if (antivirusButton) {
            antivirusButton.style.display = 'block';
        }
    }
    
    setTimeout(updateTimer, 500);
}

function increaseCorruption() {
    if (!virusActive) return;
    
    corruptionLevel++;
    
    for (let i = 0; i < 10; i++) {
        createErrorWindow();
    }
    
    document.body.style.filter = `hue-rotate(${corruptionLevel * 120}deg) contrast(${200 + corruptionLevel * 50}%) saturate(${300 + corruptionLevel * 50}%)`;
    document.body.style.transform = `skew(${Math.random() * 40 - 20}deg) scale(${0.8 + Math.random() * 0.4})`;
    
    setTimeout(increaseCorruption, 300);
}

// Initialize the game with main menu when the page loads
document.addEventListener('DOMContentLoaded', function() {
    showMainMenu();
});
</script>
